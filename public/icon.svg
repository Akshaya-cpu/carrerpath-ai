<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Rich Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>
  
  <!-- Subtle tech grid/circuit decorations in background -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="2">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Glowing geometric career-growth node lines -->
  <g filter="url(#shadow)">
    <!-- Connection lines -->
    <path d="M120 380 L210 290 L290 320 L390 180" stroke="url(#glow-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    
    <!-- Pulse Node Glows -->
    <circle cx="120" cy="380" r="16" fill="#a855f7" filter="url(#glow)" />
    <circle cx="210" cy="290" r="16" fill="#6366f1" />
    <circle cx="290" cy="320" r="16" fill="#c084fc" />
    <circle cx="390" cy="180" r="28" fill="url(#accent-grad)" filter="url(#glow)" />

    <!-- Core Nodes Inner Dots -->
    <circle cx="120" cy="380" r="6" fill="#ffffff" />
    <circle cx="210" cy="290" r="6" fill="#ffffff" />
    <circle cx="290" cy="320" r="6" fill="#ffffff" />
    <circle cx="390" cy="180" r="10" fill="#ffffff" />
  </g>

  <!-- AI Sparks/Insight bursts -->
  <path d="M390 100 L390 130" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
  <path d="M470 180 L440 180" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
  <path d="M446 124 L425 145" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Subtle professional briefcase overlay in corner or design shape -->
  <path d="M100 120 H140 V150 H100 Z M80 150 H160 V220 H80 Z" fill="#ffffff" opacity="0.1" />
</svg>
